services:
  app:
    build: .
    container_name: terminbuchung_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:11
    container_name: terminbuchung_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: terminbuchung
      MYSQL_USER: terminuser
      MYSQL_PASSWORD: TerminPasswort123!
    ports:
      - "3307:3306"
    volumes:
      - terminbuchung_db_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: terminbuchung_adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  terminbuchung_db_data:
